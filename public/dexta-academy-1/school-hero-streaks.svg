<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="none" role="img" aria-labelledby="title desc">
<title id="title">Homepage hero abstract line bursts</title>
<desc id="desc">Repeated mural-style lines spread across the hero so the pattern feels more random and less fixed.</desc>
<style>
.stroke {
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 100;
  stroke-dashoffset: 100;
  opacity: 0;
}
.orange { stroke: #FF6B35; }
.sky { stroke: #7fd0ff; }
.white { stroke: #ffffff; }
.blue { stroke: #07801b; }
.thin-white { stroke: #acb893; }
.thick { stroke-width: 34; }
.mid { stroke-width: 28; }
.slim { stroke-width: 18; }
.fine { stroke-width: 12; }
.group { transform-box: fill-box; transform-origin: center; }
.group-a { animation: driftA 21s ease-in-out infinite alternate; }
.group-b { animation: driftB 26s ease-in-out infinite alternate; }
.group-c { animation: driftC 24s ease-in-out infinite alternate; }
.group-d { animation: driftD 28s ease-in-out infinite alternate; }
.group-e { animation: driftE 22s ease-in-out infinite alternate; }
.group-f { animation: driftF 30s ease-in-out infinite alternate; }
@keyframes driftA { 0% { transform: translate(0, 0); } 100% { transform: translate(24px, -16px); } }
@keyframes driftB { 0% { transform: translate(0, 0); } 100% { transform: translate(-28px, 22px); } }
@keyframes driftC { 0% { transform: translate(0, 0); } 100% { transform: translate(18px, 20px); } }
@keyframes driftD { 0% { transform: translate(0, 0); } 100% { transform: translate(-22px, -18px); } }
@keyframes driftE { 0% { transform: translate(0, 0); } 100% { transform: translate(16px, -24px); } }
@keyframes driftF { 0% { transform: translate(0, 0); } 100% { transform: translate(-18px, 14px); } }
@media (prefers-reduced-motion: reduce) {
  .stroke {
    stroke-dashoffset: 0;
    opacity: .9;
  }
  .group-a, .group-b, .group-c, .group-d, .group-e, .group-f {
    animation: none;
  }
}
</style>

<g class="group group-a">
  <path class="stroke blue mid" pathLength="100" d="M86 620C126 676 166 742 214 826">
    <animate attributeName="stroke-dashoffset" values="100;100;0;0" keyTimes="0;0.1;0.34;1" dur="8.6s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.1;0.26;0.56;1" dur="8.6s" begin="0.4s" repeatCount="indefinite"/>
  </path>

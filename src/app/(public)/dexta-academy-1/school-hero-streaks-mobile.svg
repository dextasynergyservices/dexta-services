<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1500" preserveAspectRatio="none" role="img" aria-labelledby="title desc">
<title id="title">Mobile hero abstract line bursts</title>
<desc id="desc">Mobile-optimized repeated mural-style lines distributed across a taller hero layout.</desc>
<style>
.stroke {
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 100;
  stroke-dashoffset: 100;
  opacity: 0;
}
.orange { stroke: #ea7c5f; }
.sky { stroke: #7fd0ff; }
.white { stroke: #f5f7ff; }
.blue { stroke: #3e69d2; }
.thin-white { stroke: #ffffff; }
.thick { stroke-width: 28; }
.mid { stroke-width: 22; }
.slim { stroke-width: 14; }
.fine { stroke-width: 9; }
.group { transform-box: fill-box; transform-origin: center; }
.group-a { animation: driftA 18s ease-in-out infinite alternate; }
.group-b { animation: driftB 22s ease-in-out infinite alternate; }
.group-c { animation: driftC 20s ease-in-out infinite alternate; }
.group-d { animation: driftD 24s ease-in-out infinite alternate; }
@keyframes driftA { 0% { transform: translate(0, 0); } 100% { transform: translate(18px, -16px); } }
@keyframes driftB { 0% { transform: translate(0, 0); } 100% { transform: translate(-20px, 18px); } }
@keyframes driftC { 0% { transform: translate(0, 0); } 100% { transform: translate(14px, 20px); } }
@keyframes driftD { 0% { transform: translate(0, 0); } 100% { transform: translate(-16px, -18px); } }
@media (prefers-reduced-motion: reduce) {
  .stroke {
    stroke-dashoffset: 0;
    opacity: .9;
  }
  .group-a, .group-b, .group-c, .group-d {
    animation: none;
  }
}
</style>

